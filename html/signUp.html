<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>signup</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>👤 회원가입</h1>
      <p>SKALA-FRONT 회원가입을 환영합니다.</p>
      <hr />
      <div>
        <form
          action="signUpResult.html"
          method="get"
          style="
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            gap: 20px;
          "
        >
          <fieldset>
            <legend>계정 정보</legend>
            <p>
              <label for="userId">아이디: </label>
              <input
                id="userId"
                type="text"
                name="userId"
                minlength="4"
                maxlength="15"
                required
                placeholder="4~15자 영문/숫자"
              />
              <small>(필수)</small>
            </p>
            <p>
              <label for="userPw">비밀번호:</label>
              <input
                id="userPw"
                type="password"
                name="userPw"
                minlength="8"
                required
                placeholder="8자 이상 입력"
              />
              <small>(필수)</small>
            </p>
            <p>
              <label for="userEmail">이메일: </label>
              <input
                id="userEmail"
                type="text"
                name="userEmail"
                placeholder="example"
              />
              @
              <select name="emailDomain">
                <option value="direct">직접 입력</option>
                <option value="naver.com">naver.com</option>
                <option value="gmail.com">gmail.com</option>
                <option value="daum.net">daum.net</option>
              </select>
            </p>
          </fieldset>

          <fieldset>
            <legend>개인 프로필 정보</legend>
            <p>
              <label for="userName">이름: </label>
              <input id="userName" type="text" name="userName" required />
            </p>
            <p>
              <label for="userBirth">생년월일: </label>
              <input id="userBirth" type="date" name="userBirth" />
            </p>
            <p>
              성별:
              <label
                ><input
                  type="radio"
                  name="gender"
                  value="male"
                  checked="checked"
                />
                남성</label
              >
              <label>
                <input type="radio" name="gender" value="female" /> 여성
              </label>
              <label>
                <input type="radio" name="gender" value="none" /> 선택안함
              </label>
            </p>
            <p>
              관심분야 (중복 선택 가능):<br />
              <label>
                <input type="checkbox" name="interest" value="frontend" /> 웹
                프론트엔드 (Vue.js/HTML) </label
              ><br />
              <label>
                <input type="checkbox" name="interest" value="uiux" /> UI/UX
                디자인 표준 </label
              ><br />
              <label>
                <input type="checkbox" name="interest" value="backend" /> 백엔드
                & 데이터베이스 </label
              ><br />
              <label>
                <input type="checkbox" name="interest" value="devops" />
                클라우드 & 인프라
              </label>
            </p>
            <p>
              <label for="route">가입 경로: </label>
              <select id="route" name="route">
                <option value="">-- 선택해주세요 --</option>
                <option value="search">검색 엔진</option>
                <option value="social">소셜 미디어</option>
                <option value="friend">친구 추천</option>
                <option value="event">행사/프로모션</option>
              </select>
            </p>
          </fieldset>

          <fieldset>
            <legend>자기소개</legend>
            <p>
              <label for="intro"
                >나를 표현하는 한 줄 소개 또는 가입 인사: </label
              ><br />
              <textarea
                id="intro"
                name="intro"
                rows="5"
                cols="50"
                placeholder="여기에 내용을 입력하세요 (최대 200자)"
                style="resize: vertical"
              ></textarea>
            </p>
          </fieldset>

          <div style="display: flex; align-items: center; gap: 4px">
            <button type="submit">동의하고 회원가입</button>
            <button type="reset">다시 작성</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
