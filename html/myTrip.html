<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my trip</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>🌏 나의 여행 앨범 🎵</h1>
      <audio controls loop>
        <source src="../media/music.mp3" type="audio/mpeg" />
        Your browser does not support the audio element.
      </audio>
      <hr />
      <section class="grid-container">
        <p class="trip-card">
          <img src="../media/travel1.jpg" alt="리장 호도협 (2025년)" />
          <br />
          리장 호도협 (2025년)
        </p>
        <p class="trip-card">
          <img src="../media/travel2.jpg" alt="세부 탑스힐 (2024년)" />
          <br />
          세부 탑스힐 (2024년)
        </p>
        <p class="trip-card">
          <img src="../media/travel3.jpg" alt="훗카이도 대설산 (2025년)" />
          <br />
          훗카이도 대설산 (2025년)
        </p>
      </section>
      <hr />
      <section>
        <h2>📹 나의 여행 브이로그</h2>
        <p>
          <video width="500" height="300" controls>
            <source src="../media/vlog.mp4" type="video/mp4" />
            Your browser does not support the video element.
          </video>
          <br />
          리장의 아름다운 음악 ✈️
        </p>
      </section>
    </div>
  </body>
</html>
